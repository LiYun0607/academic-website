<header class="site-header">
    <nav class="navbar container">
        <a class="brand" href="{{ .Site.LanguagePrefix | relURL }}">{{ .Site.Params.author }}</a>
        <ul class="nav-menu">
            {{ range .Site.Menus.main }}
            <li><a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a></li>
            {{ end }}
        </ul>
        <div class="lang-switcher">
            {{ range .Site.Languages }}
                {{ $lang := . }}
                {{ if eq $.Site.Language.Lang .Lang }}
                    <span class="lang-current">{{ .LanguageName }}</span>
                {{ else }}
                    <a href="/{{ .Lang }}/">{{ .LanguageName }}</a>
                {{ end }}
            {{ end }}
        </div>
    </nav>
</header>
